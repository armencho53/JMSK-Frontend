name: Deploy Frontend

on:
  push:
    branches: [main, develop, staging]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package*.json'
      - 'vite.config.*'
      - 'index.html'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package*.json'
      - 'vite.config.*'
      - 'index.html'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: development
        type: choice
        options:
          - development
          - staging
          - production

permissions:
  id-token: write
  contents: read

jobs:
  determine-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      aws-role: ${{ steps.set-env.outputs.aws-role }}
      backend-url: ${{ steps.set-env.outputs.backend-url }}
      frontend-url: ${{ steps.set-env.outputs.frontend-url }}
    steps:
      - name: Determine environment
        id: set-env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            ENV="production"
          elif [ "${{ github.ref }}" == "refs/heads/staging" ]; then
            ENV="staging"
          else
            ENV="development"
          fi
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          case $ENV in
            production)
              echo "aws-role=${{ vars.AWS_ROLE_ARN_PROD }}" >> $GITHUB_OUTPUT
              echo "backend-url=${{ vars.BACKEND_URL_PROD }}" >> $GITHUB_OUTPUT
              echo "frontend-url=${{ vars.FRONTEND_URL_PROD }}" >> $GITHUB_OUTPUT
              ;;
            staging)
              echo "aws-role=${{ vars.AWS_ROLE_ARN_STAGE }}" >> $GITHUB_OUTPUT
              echo "backend-url=${{ vars.BACKEND_URL_STAGE }}" >> $GITHUB_OUTPUT
              echo "frontend-url=${{ vars.FRONTEND_URL_STAGE }}" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "aws-role=${{ vars.AWS_ROLE_ARN_DEV }}" >> $GITHUB_OUTPUT
              echo "backend-url=${{ vars.BACKEND_URL_DEV }}" >> $GITHUB_OUTPUT
              echo "frontend-url=${{ vars.FRONTEND_URL_DEV }}" >> $GITHUB_OUTPUT
              ;;
          esac

  test-and-build:
    runs-on: ubuntu-latest
    needs: determine-environment
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:coverage

      - name: Build
        env:
          VITE_API_URL: ${{ needs.determine-environment.outputs.backend-url }}
        run: |
          if [ "${{ needs.determine-environment.outputs.environment }}" == "production" ]; then
            npm run build:prod
          else
            npm run build
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ needs.determine-environment.outputs.environment }}
          path: dist/
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: [determine-environment, test-and-build]
    if: github.event_name != 'pull_request'
    environment:
      name: ${{ needs.determine-environment.outputs.environment }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.determine-environment.outputs.environment }}
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.determine-environment.outputs.aws-role }}
          aws-region: us-east-1

      - name: Deploy to S3
        run: |
          BUCKET="${{ vars.S3_BUCKET_NAME }}-${{ needs.determine-environment.outputs.environment }}"
          aws s3 sync dist/ s3://$BUCKET/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"
          aws s3 sync dist/ s3://$BUCKET/ \
            --exclude "*" --include "*.html" \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront
        if: vars.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
